name: architecture-guard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  import-direction:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run architecture guard
        shell: pwsh
        run: pwsh ./testing/arch_guard.ps1
