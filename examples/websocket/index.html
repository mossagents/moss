<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moss websocket demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #334; font-weight: 600; color: #7c3aed; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #3b82f6; color: #fff; }
  .msg.assistant { align-self: flex-start; background: #2d2d44; }
  .msg.system { align-self: center; color: #6b7280; font-style: italic; font-size: 0.9em; }
  .msg.error { align-self: center; color: #ef4444; font-weight: 600; }
  .msg.tool { align-self: flex-start; color: #f59e0b; font-size: 0.85em; }
  .msg.progress { align-self: flex-start; color: #6b7280; font-style: italic; font-size: 0.85em; }
  #input-area { padding: 12px 16px; background: #16213e; border-top: 1px solid #334; display: flex; gap: 8px; }
  #input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #334; background: #1a1a2e; color: #eee; font-size: 1em; outline: none; }
  #input:focus { border-color: #7c3aed; }
  #send { padding: 8px 16px; border-radius: 6px; border: none; background: #7c3aed; color: #fff; cursor: pointer; font-size: 1em; }
  #send:hover { background: #6d28d9; }
  #send:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>
<div id="header">🌿 moss websocket demo</div>
<div id="messages"></div>
<div id="input-area">
  <input id="input" placeholder="输入消息..." autocomplete="off" />
  <button id="send">发送</button>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
let ws, streaming = null;
const wsToken = '__MOSS_WS_TOKEN__';

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws?token=${encodeURIComponent(wsToken)}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'assistant':
        addMsg('assistant', msg.content);
        streaming = null;
        break;
      case 'stream':
        if (!streaming) { streaming = addMsg('assistant', ''); }
        streaming.textContent += msg.content;
        messages.scrollTop = messages.scrollHeight;
        break;
      case 'stream_end':
        streaming = null;
        break;
      case 'system':
        addMsg('system', msg.content);
        break;
      case 'error':
        addMsg('error', msg.content);
        break;
      case 'tool_start':
        addMsg('tool', '🔧 ' + msg.content);
        break;
      case 'tool_result':
        addMsg('tool', '✅ ' + (msg.content.length > 200 ? msg.content.slice(0, 200) + '...' : msg.content));
        break;
      case 'progress':
        addMsg('progress', '⏳ ' + msg.content);
        break;
      case 'ask':
        addMsg('system', '❓ ' + msg.content);
        if (msg.options) msg.options.forEach((o, i) => addMsg('system', `  ${i+1}) ${o}`));
        break;
    }
  };
  ws.onclose = () => addMsg('system', '连接已断开');
  ws.onerror = () => addMsg('error', '连接错误');
}

function addMsg(type, text) {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.textContent = text;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
  return el;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ type: 'user', content: text }));
  input.value = '';
}

sendBtn.onclick = send;
input.onkeydown = (e) => { if (e.key === 'Enter') send(); };
connect();
</script>
</body>
</html>
