id: coding-handle-nil-error-path-05
description: Ensure agent handles nil/error branches when proposing fixes
tags: [core, coding, smoke]

input:
  messages:
    - role: user
      content: "请修复函数中的 nil 指针风险并补充错误分支处理"
  tools: [read_file, insert_edit_into_file]

expect:
  tool_called: [read_file]
  contains: ["nil", "错误"]
  max_steps: 10

scoring:
  pass_threshold: 0.8
  weights:
    rule: 1.0

